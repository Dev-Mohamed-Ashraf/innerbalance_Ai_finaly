name: innerbalancee
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Architecture & State Management
  dartz: ^0.10.1
  equatable: ^2.0.5
  get_it: ^7.6.0
  flutter_bloc: ^8.1.3
  
  # Backend & Network
  supabase_flutter: ^2.0.0
  internet_connection_checker: ^1.0.0+1
  uuid: ^4.0.0
  shared_preferences: ^2.2.0
  http: ^1.2.0
  
  # UI & Assets
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  image: ^4.0.17
  
  # Video & Audio Calls
  zego_uikit_prebuilt_call: ^4.21.1
  
  # AI & Camera
  tflite_flutter: ^0.12.1
  camera: ^0.10.5+5
  permission_handler: ^12.0.1
  timeago: ^3.7.1
  zego_uikit_signaling_plugin: ^2.8.19
  google_generative_ai: ^0.4.0
  image_picker: ^1.0.4
  flutter_dotenv: ^5.1.0
  google_mlkit_face_detection: ^0.13.0
  zego_uikit: ^2.28.34

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
